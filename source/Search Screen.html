<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Поиск — Соцсеть про еду</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0E1411; min-height: 100vh; font-family: 'Inter', Arial, sans-serif; color: #fff; }
  .stage { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; box-sizing: border-box; }
  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  .ambient { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .ambient::before, .ambient::after {
    content: ''; position: absolute; width: 700px; height: 700px; border-radius: 50%;
    filter: blur(120px); opacity: 0.35;
  }
  .ambient::before { background: #2ecc71; left: -200px; top: -200px; }
  .ambient::after { background: #1FA85C; right: -200px; bottom: -200px; }
  .caption { position: fixed; left: 24px; top: 20px; z-index: 1; color: rgba(255,255,255,0.55); font-size: 12px; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
</style>
</head>
<body>
  <div class="ambient"></div>
  <div class="caption">Поиск · Liquid Glass + Flat · #2ECC71</div>
  <div class="stage" data-screen-label="01 Search">
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/SearchScreen.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "brand": "#2ECC71",
      "palette": "fresh",
      "density": "comfortable"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <React.Fragment>
          <IOSDevice width={402} height={874}>
            <SearchScreen tweaks={tweaks} />
          </IOSDevice>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Бренд">
              <TweakColor
                label="Акцент"
                value={tweaks.brand}
                onChange={(v) => setTweak('brand', v)}
                options={['#2ECC71', '#0EAA66', '#34C759', '#7DD957']}
              />
            </TweakSection>
            <TweakSection title="Фон">
              <TweakRadio
                label="Палитра"
                value={tweaks.palette}
                onChange={(v) => setTweak('palette', v)}
                options={[
                  { value: 'fresh', label: 'Свежий' },
                  { value: 'citrus', label: 'Цитрус' },
                  { value: 'dusk', label: 'Сумерки' },
                ]}
              />
            </TweakSection>
            <TweakSection title="Плотность">
              <TweakRadio
                label="Карточки"
                value={tweaks.density}
                onChange={(v) => setTweak('density', v)}
                options={[
                  { value: 'comfortable', label: 'Compact' },
                  { value: 'cozy', label: 'Cozy' },
                ]}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
